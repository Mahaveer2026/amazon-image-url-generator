<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Amazon Image Link Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<div class="text-center mb-5">

<h1 class="fw-bold">

<i class="bi bi-images text-primary"></i>

Amazon Image Link Generator

</h1>

<p class="text-muted">

Upload Images → Get Direct Google Drive Links → Download Excel

</p>

</div>

<form id="uploadForm">

<div id="dropArea" class="upload-box">

<div class="mb-3">

<i class="bi bi-cloud-arrow-up display-1 text-primary"></i>

</div>

<h4>

Drag & Drop Images Here

</h4>

<p>

or

</p>

<input

type="file"

id="images"

name="images"

multiple

accept=".jpg,.jpeg,.png,.webp"

class="form-control">

</div>

<div class="mt-4">

<button

type="submit"

class="btn btn-primary btn-lg w-100">

<i class="bi bi-upload"></i>

Upload Images

</button>

</div>

</form>

<div class="progress mt-4 d-none" id="progressContainer">

<div

class="progress-bar progress-bar-striped progress-bar-animated"

id="progressBar"

style="width:0%">

0%

</div>

</div>

<hr class="my-5">

<div class="d-flex gap-3 flex-wrap">

<button

id="copyAll"

class="btn btn-success">

<i class="bi bi-copy"></i>

Copy All URLs

</button>

<a

href="/download"

class="btn btn-warning">

<i class="bi bi-file-earmark-excel"></i>

Download Excel

</a>

</div>

<hr>

<div id="results" class="row gy-4">

    <div class="col-12">

        <div class="card border-0 shadow-sm">

            <div class="card-body">

                <h4 class="mb-4">Uploaded Images</h4>

                <div id="imageList"></div>

            </div>

        </div>

    </div>

</div>
  </div>
  </div>
  </div>
  </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
