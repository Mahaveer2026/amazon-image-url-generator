<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amazon Image Link Generator</title>

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">

            <!-- Header -->
            <div class="text-center mb-5">
              <h1 class="fw-bold">
                <i class="bi bi-images text-primary"></i>
                Amazon Image Link Generator
              </h1>
              <p class="text-muted">
                Upload Images &rarr; Get Direct Google Drive Links &rarr; Download Excel
              </p>
            </div>

            <!-- Upload form -->
            <form id="uploadForm">
              <div id="dropArea" class="upload-box">
                <div class="mb-3">
                  <i class="bi bi-cloud-arrow-up display-1 text-primary"></i>
                </div>
                <h4>Drag &amp; Drop Images Here</h4>
                <p>or click below to browse</p>

                <input
                  type="file"
                  id="images"
                  name="images"
                  multiple
                  accept=".jpg,.jpeg,.png,.webp"
                  class="form-control"
                  aria-label="Select images to upload">
              </div>

              <!-- Selected-file preview (before upload) -->
              <div id="previewArea" class="row gy-3 mt-4 d-none"></div>

              <div class="mt-4">
                <button type="submit" id="uploadBtn" class="btn btn-primary btn-lg w-100">
                  <i class="bi bi-upload"></i>
                  Upload Images
                </button>
              </div>
            </form>

            <!-- Upload progress bar -->
            <div class="progress mt-4 d-none" id="progressContainer">
              <div
                class="progress-bar progress-bar-striped progress-bar-animated"
                id="progressBar"
                role="progressbar"
                style="width:0%"
                aria-valuenow="0"
                aria-valuemin="0"
                aria-valuemax="100">
                0%
              </div>
            </div>

            <hr class="my-5">

            <!-- Bulk actions -->
            <div class="d-flex gap-3 flex-wrap">
              <button id="copyAll" class="btn btn-success" disabled>
                <i class="bi bi-copy"></i>
                Copy All URLs
              </button>

              <button id="downloadExcel" class="btn btn-warning">
                <i class="bi bi-file-earmark-excel"></i>
                Download Excel
              </button>
            </div>

            <hr>

            <!-- Uploaded image results -->
            <div id="results" class="row gy-4">
              <div class="col-12">
                <div class="card border-0 shadow-sm">
                  <div class="card-body">
                    <h4 class="mb-4">Uploaded Images</h4>
                    <div id="emptyState" class="text-muted text-center py-4">
                      <i class="bi bi-inbox display-4 d-block mb-2"></i>
                      No images uploaded yet.
                    </div>
                    <div id="imageList" class="row gy-4"></div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toastMessage" class="toast-message"></div>

  <!-- Bootstrap JS + custom script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
